<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndepPerform - Évaluation 15 Jours</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        h1 { color: #2563eb; text-align: center; margin-bottom: 0.5rem; font-size: 2.5rem; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 2rem; font-size: 1.1rem; }
        
        .hidden { display: none !important; }
        
        /* Login Options */
        .login-options {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        
        .google-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: #9ca3af;
            font-size: 0.875rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
            margin: 0 1rem;
        }
        
        .email-toggle {
            color: #2563eb;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .email-toggle:hover {
            text-decoration: underline;
        }
        
        /* Formulaire Email */
        .email-form {
            text-align: left;
            animation: fadeIn 0.3s ease;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
            font-size: 0.875rem;
        }
        input[type="email"], input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        button { 
            background: #2563eb; 
            color: white; 
            border: none; 
            padding: 0.875rem 1.5rem; 
            border-radius: 0.5rem; 
            cursor: pointer; 
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        button:hover { 
            background: #1d4ed8; 
            transform: translateY(-1px);
        }
        
        /* Questionnaire */
        .progress-container { margin-bottom: 2rem; }
        .progress-bar { 
            height: 10px; 
            background: #e5e7eb; 
            border-radius: 999px; 
            overflow: hidden;
        }
        .progress-fill { 
            height: 100%; 
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-text {
            text-align: center;
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            font-weight: 500;
        }
        
        .question { 
            margin-bottom: 2rem; 
            padding: 1.5rem;
            background: #f9fafb;
            border-radius: 1rem;
            border: 1px solid #e5e7eb;
        }
        .question-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .question-number {
            background: #2563eb;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.875rem;
        }
        .pillar-tag {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
        }
        .tag-argent { background: #dcfce7; color: #15803d; }
        .tag-sante { background: #fee2e2; color: #dc2626; }
        .tag-competence { background: #dbeafe; color: #2563eb; }
        .tag-temps { background: #ffedd5; color: #d97706; }
        .tag-discipline { background: #f3f4f6; color: #1f2937; border: 1px solid #d1d5db; }
        
        .question-text { font-weight: 600; margin-bottom: 1rem; color: #1e293b; }
        
        .options { display: flex; flex-direction: column; gap: 0.5rem; }
        .option-label {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-label:hover { border-color: #2563eb; background: #eff6ff; }
        .option-label.selected { border-color: #2563eb; background: #eff6ff; }
        .option-label input[type="radio"] { margin-right: 0.75rem; display: none; }
        
        .nav-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            flex: 1;
        }
        .btn-secondary:hover { background: #e5e7eb; }
        .btn-primary { flex: 2; }
        
        /* Résultats */
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(#2563eb calc(var(--score) * 1%), #e5e7eb 0);
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .score-inner {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .score-value { font-size: 2.5rem; font-weight: 800; color: #1f2937; }
        
        .logout-btn {
            background: #fee2e2;
            color: #dc2626;
            width: auto;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            float: right;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- PAGE DE CONNEXION -->
    <div id="login-page" class="container">
        <h1>IndepPerform</h1>
        <p class="subtitle">Évaluez vos 5 piliers d'indépendance<br>15 questions • 5 minutes • Résultats immédiats</p>
        
        <div class="login-options">
            <!-- Option 1: Google -->
            <div class="google-section">
                <div id="g_id_onload" data-client_id="TON_CLIENT_ID.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
                <div id="google-btn"></div>
            </div>
            
            <div class="divider">ou</div>
            
            <!-- Option 2: Email -->
            <div id="email-section">
                <p class="email-toggle" onclick="showEmailForm()">📧 S'inscrire avec mon email</p>
                
                <form id="email-form" class="email-form hidden" onsubmit="handleEmailSubmit(event)">
                    <div class="form-group">
                        <label>Prénom</label>
                        <input type="text" id="prenom" required placeholder="Jean">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="jean@exemple.com">
                    </div>
                    <button type="submit">Commencer l'évaluation</button>
                    <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem; color: #9ca3af;">
                        🔒 Vos données sont sécurisées
                    </p>
                </form>
            </div>
        </div>
    </div>

    <!-- QUESTIONNAIRE -->
    <div id="quiz-page" class="container hidden">
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
        <div style="clear: both; margin-bottom: 1rem;"></div>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="progress-text">Question <span id="current-q">1</span> sur 15</div>
        </div>

        <div id="question-container"></div>

        <div class="nav-buttons">
            <button type="button" class="btn-secondary" id="btn-prev" onclick="previousQuestion()" style="visibility: hidden;">Précédent</button>
            <button type="button" class="btn-primary" id="btn-next" onclick="nextQuestion()">Suivant</button>
        </div>
    </div>

    <!-- RÉSULTATS -->
    <div id="results-page" class="container hidden">
        <div style="text-align: center; padding: 2rem 0;">
            <div class="score-circle" id="score-circle" style="--score: 0;">
                <div class="score-inner">
                    <div class="score-value" id="final-score">0</div>
                    <div style="font-size: 0.875rem; color: #6b7280;">/100</div>
                </div>
            </div>
            
            <h2 id="result-title" style="margin-bottom: 1rem;">Analyse...</h2>
            <p id="result-desc" style="color: #4b5563; margin-bottom: 2rem;"></p>
            
            <button onclick="restartQuiz()" style="margin-right: 1rem;">Refaire le test</button>
            <button onclick="logout()" class="btn-secondary" style="width: auto; display: inline-block;">Accueil</button>
        </div>
    </div>

    <script>
        // CONFIGURATION - REMPLACE CES VALEURS :
        const CLIENT_ID = '897351129013-4qfu68vrgocp1ddjg21acgv7kh3g4nnf.apps.googleusercontent.com'; // Ton Client ID Google
        const SYSTEME_API_KEY = 't6uoopfvjngx9avptr7ibahqiwegcoamn6n0e5fxaqbbmntfe2s5prhzvxdnkgpt'; // Ta clé API Systeme.io
        const SYSTEME_TAG_ID = 'inscrit-google-ip'; // Ton ID de tag
        
        let userData = null;
        let currentQuestion = 0;
        let answers = new Array(15).fill(null);
        
        // Initialisation Google Sign-In
        window.onload = function() {
            // Vérifier si déjà connecté
            const saved = localStorage.getItem('ip_user');
            if (saved) {
                userData = JSON.parse(saved);
                showQuiz();
            } else {
                // Initialiser le bouton Google
                if (typeof google !== 'undefined') {
                    google.accounts.id.initialize({
                        client_id: CLIENT_ID,
                        callback: handleCredentialResponse
                    });
                    google.accounts.id.renderButton(
                        document.getElementById("google-btn"),
                        { theme: "outline", size: "large", width: 300, text: "continue_with" }
                    );
                }
            }
        };
        
        // Callback Google
        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            userData = {
                email: payload.email,
                firstName: payload.given_name || payload.name,
                picture: payload.picture,
                id: payload.sub
            };
            loginSuccess();
        }
        
        // Afficher formulaire email
        function showEmailForm() {
            document.querySelector('.google-section').classList.add('hidden');
            document.querySelector('.divider').classList.add('hidden');
            document.querySelector('.email-toggle').classList.add('hidden');
            document.getElementById('email-form').classList.remove('hidden');
        }
        
        // Submit Email
        function handleEmailSubmit(e) {
            e.preventDefault();
            userData = {
                email: document.getElementById('email').value,
                firstName: document.getElementById('prenom').value
            };
            loginSuccess();
        }
        
        // Login réussi (Google ou Email)
        function loginSuccess() {
            localStorage.setItem('ip_user', JSON.stringify(userData));
            sendToSystemeIO(userData);
            showQuiz();
        }
        
        // Envoi Systeme.io
        async function sendToSystemeIO(data) {
            try {
                await fetch('https://api.systeme.io/api/contacts', {
                    method: 'POST',
                    headers: {
                        'X-Api-Key': SYSTEME_API_KEY,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: data.email,
                        firstName: data.firstName,
                        tags: [SYSTEME_TAG_ID]
                    })
                });
                console.log('✅ Contact envoyé à Systeme.io');
            } catch (e) {
                console.log('Mode local (CORS):', e);
            }
        }
        
        // Les 15 questions
        const questions = [
            // ARGENT
            {pillar: 'argent', tagClass: 'tag-argent', text: "Avez-vous un budget mensuel établi et suivi régulièrement ?", options: [{value: 0, text: "Non, je ne tiens pas de budget"}, {value: 33, text: "Vague idée mais pas formalisé"}, {value: 66, text: "J'ai un budget mais je ne le suis pas toujours"}, {value: 100, text: "Budget strict mensuel"}]},
            {pillar: 'argent', tagClass: 'tag-argent', text: "Votre épargne couvre combien de mois de dépenses ?", options: [{value: 0, text: "Moins d'1 mois"}, {value: 33, text: "1 à 3 mois"}, {value: 66, text: "3 à 6 mois"}, {value: 100, text: "6 mois ou plus"}]},
            {pillar: 'argent', tagClass: 'tag-argent', text: "Avez-vous des revenus passifs ou sources multiples ?", options: [{value: 0, text: "Une seule source (salaire)"}, {value: 33, text: "Idées mais rien de mis en place"}, {value: 66, text: "1 source secondaire"}, {value: 100, text: "2+ sources diversifiées"}]},
            // SANTÉ
            {pillar: 'sante', tagClass: 'tag-sante', text: "Activité physique par semaine ?", options: [{value: 0, text: "Jamais"}, {value: 33, text: "1 fois"}, {value: 66, text: "2-3 fois"}, {value: 100, text: "4 fois ou plus"}]},
            {pillar: 'sante', tagClass: 'tag-sante', text: "Sommeil régulier (7-8h/nuit) ?", options: [{value: 0, text: "Moins de 6h"}, {value: 33, text: "6-7h perturbées"}, {value: 66, text: "7h assez régulier"}, {value: 100, text: "7-8h qualité"}]},
            {pillar: 'sante', tagClass: 'tag-sante', text: "Routine de bien-être ?", options: [{value: 0, text: "Aucune"}, {value: 33, text: "Essais sans régularité"}, {value: 66, text: "Quelques habitudes"}, {value: 100, text: "Routine complète"}]},
            // COMPÉTENCE
            {pillar: 'competence', tagClass: 'tag-competence', text: "Nouvelle compétence apprise chaque mois ?", options: [{value: 0, text: "Je n'apprends rien"}, {value: 33, text: "Occasionnellement"}, {value: 66, text: "1-2 fois/mois"}, {value: 100, text: "Apprentissage continu"}]},
            {pillar: 'competence', tagClass: 'tag-competence', text: "Mentor, coach ou formations régulières ?", options: [{value: 0, text: "Aucun"}, {value: 33, text: "Lectures/vidéos"}, {value: 66, text: "Formation en cours"}, {value: 100, text: "Mentor régulier"}]},
            {pillar: 'competence', tagClass: 'tag-competence', text: "Veille stratégique dans votre secteur ?", options: [{value: 0, text: "Jamais"}, {value: 33, text: "Rarement"}, {value: 66, text: "1-2 fois/semaine"}, {value: 100, text: "Veille quotidienne"}]},
            // TEMPS
            {pillar: 'temps', tagClass: 'tag-temps', text: "Méthode de gestion du temps (Pomodoro, Time Blocking) ?", options: [{value: 0, text: "Aucune"}, {value: 33, text: "Essais irréguliers"}, {value: 66, text: "2-3 fois/semaine"}, {value: 100, text: "Quotidien"}]},
            {pillar: 'temps', tagClass: 'tag-temps', text: "Arrivez-vous à dire 'non' aux distractions ?", options: [{value: 0, text: "Constamment dérangé"}, {value: 33, text: "J'ai du mal"}, {value: 66, text: "Je protège 50%"}, {value: 100, text: "Contrôle total"}]},
            {pillar: 'temps', tagClass: 'tag-temps', text: "Plages 'Deep Work' dans votre agenda ?", options: [{value: 0, text: "Jamais"}, {value: 33, text: "Rarement"}, {value: 66, text: "2-3 fois/semaine"}, {value: 100, text: "Tous les jours"}]},
            // DISCIPLINE
            {pillar: 'discipline', tagClass: 'tag-discipline', text: "Heure de réveil régulière (7j/7) ?", options: [{value: 0, text: "Totalement irrégulier"}, {value: 33, text: "Semaine seulement"}, {value: 66, text: "Assez régulier"}, {value: 100, text: "Rythme strict 7j/7"}]},
            {pillar: 'discipline', tagClass: 'tag-discipline', text: "Journal de progression ou revues hebdo ?", options: [{value: 0, text: "Jamais"}, {value: 33, text: "Occasionnel"}, {value: 66, text: "Mental/non écrit"}, {value: 100, text: "Journal structuré"}]},
            {pillar: 'discipline', tagClass: 'tag-discipline', text: "Respect des deadlines auto-imposées ?", options: [{value: 0, text: "Je reporte toujours"}, {value: 33, text: "Parfois"}, {value: 66, text: "Assez régulier"}, {value: 100, text: "Parole d'or"}]}
        ];
        
        function showQuiz() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            renderQuestion();
        }
        
        function renderQuestion() {
            const q = questions[currentQuestion];
            const container = document.getElementById('question-container');
            
            let html = `
                <div class="question">
                    <div class="question-header">
                        <div class="question-number">${currentQuestion + 1}</div>
                        <span class="pillar-tag ${q.tagClass}">${q.pillar}</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
            `;
            
            q.options.forEach((opt, idx) => {
                const selected = answers[currentQuestion] === idx ? 'selected' : '';
                html += `
                    <label class="option-label ${selected}" onclick="selectOption(${idx})">
                        <input type="radio" name="q${currentQuestion}" value="${idx}" ${selected ? 'checked' : ''}>
                        <span>${opt.text}</span>
                    </label>
                `;
            });
            
            html += '</div></div>';
            container.innerHTML = html;
            
            document.getElementById('progress-bar').style.width = ((currentQuestion + 1) / 15 * 100) + '%';
            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('btn-prev').style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
            document.getElementById('btn-next').textContent = currentQuestion === 14 ? 'Voir mes résultats' : 'Suivant';
        }
        
        function selectOption(idx) {
            document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            answers[currentQuestion] = idx;
        }
        
        function nextQuestion() {
            if (answers[currentQuestion] === null) {
                alert('Veuillez sélectionner une réponse');
                return;
            }
            if (currentQuestion < 14) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResults();
            }
        }
        
        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }
        
        function showResults() {
            let total = 0;
            answers.forEach((idx, i) => total += questions[i].options[idx].value);
            const score = Math.round(total / 15);
            
            document.getElementById('quiz-page').classList.add('hidden');
            document.getElementById('results-page').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('score-circle').style.setProperty('--score', score);
                document.getElementById('final-score').textContent = score;
            }, 100);
            
            const titles = {
                expert: ['🚀 Expert', 'Vous maîtrisez vos 5 piliers. Passez à l\'optimisation.'],
                avance: ['💪 Avancé', 'Bonne base. Quelques ajustements pour l\'excellence.'],
                intermediaire: ['📈 Intermédiaire', 'Programme 15 jours idéal pour vous.'],
                debutant: ['🌱 Débutant', 'Travail structuré nécessaire sur les fondations.']
            };
            const lvl = score >= 80 ? 'expert' : score >= 60 ? 'avance' : score >= 40 ? 'intermediaire' : 'debutant';
            document.getElementById('result-title').textContent = titles[lvl][0] + ' (' + score + '/100)';
            document.getElementById('result-desc').textContent = titles[lvl][1];
        }
        
        function restartQuiz() {
            currentQuestion = 0;
            answers = new Array(15).fill(null);
            document.getElementById('results-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            renderQuestion();
        }
        
        function logout() {
            localStorage.removeItem('ip_user');
            location.reload();
        }
    </script>
</body>
</html>
